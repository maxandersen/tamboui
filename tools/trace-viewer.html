<!doctype html>
<html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Tamboui Trace Viewer</title>
<style>body{margin:0;font-family:system-ui;background:#0f1115;color:#dbe3ef}header{padding:10px 14px;border-bottom:1px solid #2a3140;display:flex;gap:10px;align-items:center}main{display:grid;grid-template-columns:320px 1fr 360px;height:calc(100vh - 52px)}.pane{border-right:1px solid #2a3140;overflow:auto}.pane:last-child{border-right:none}.section{padding:10px;border-bottom:1px solid #2a3140}h2{font-size:12px;color:#8fa0b8;text-transform:uppercase;margin:0 0 8px}.mono{font-family:ui-monospace,monospace;font-size:12px}select,input,button{background:#171a21;color:#dbe3ef;border:1px solid #2a3140;border-radius:6px;padding:6px 8px}.tree ul{list-style:none;margin:0;padding-left:16px}.tree li{padding:2px 0}.node{display:inline-block;padding:2px 6px;border-radius:6px;cursor:pointer}.node:hover{background:#1f2531}.selected{background:#23354a;outline:1px solid #325a7f}#canvas{position:relative;background:#0a0d12;border:1px solid #2a3140;min-height:320px}.box{position:absolute;border:1px solid rgba(88,196,255,.55);background:rgba(88,196,255,.08);color:#a8ddff;font-size:10px;padding:1px 2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}.box.selected{border-color:#ffd166;background:rgba(255,209,102,.15);color:#ffe6a6}table{width:100%;border-collapse:collapse;font-size:12px}td{border-bottom:1px solid #2a3140;padding:6px 4px;vertical-align:top}td.k{color:#8fa0b8;width:42%}</style></head>
<body>
<header><strong>Tamboui Trace Viewer</strong><input id="file" type="file" accept="application/json,.json"/><select id="frameSelect"></select><button id="fit">Fit</button><span id="meta" class="mono" style="color:#8fa0b8"></span></header>
<main>
<div class="pane"><div class="section"><h2>Tree</h2><div class="tree mono" id="tree"></div></div></div>
<div class="pane"><div class="section" style="border-bottom:none;padding:0"><h2 style="padding:10px;margin:0">Layout</h2><div id="canvas"></div></div></div>
<div class="pane"><div class="section"><h2>Frame</h2><table id="frameInfo"></table></div><div class="section"><h2>Node</h2><table id="nodeInfo"></table></div></div>
</main>
<script>
(()=>{let trace=null,frame=null,selectedNodeId=null;const el=id=>document.getElementById(id);
el('file').addEventListener('change',async e=>{const f=e.target.files?.[0];if(!f)return;trace=JSON.parse(await f.text());initTrace();});
el('frameSelect').addEventListener('change',()=>{frame=trace.frames[Number(el('frameSelect').value||0)];selectedNodeId=null;render();});
el('fit').addEventListener('click',drawLayout);
function initTrace(){if(!trace?.frames?.length)return;el('meta').textContent=`${trace.meta?.app||'app'} · ${trace.frames.length} frame(s)`;const fs=el('frameSelect');fs.innerHTML='';trace.frames.forEach((f,i)=>{const o=document.createElement('option');o.value=i;o.textContent=`#${f.frameId} (${f.screen?.w||0}x${f.screen?.h||0})`;fs.appendChild(o);});fs.value='0';frame=trace.frames[0];render();}
function render(){if(!frame)return;drawFrameInfo();drawTree();drawLayout();drawNodeInfo();}
function drawFrameInfo(){const s=frame.summary||{};const rows=[['frameId',frame.frameId],['screen',`${frame.screen?.w||0} x ${frame.screen?.h||0}`],['focusedNodeId',frame.focusedNodeId],['routeId',frame.routeId],['nodeCount',s.nodeCount],['layoutTotalNanos',s.layoutTotalNanos],['renderTotalNanos',s.renderTotalNanos],['diffNanos',s.diffNanos],['flushNanos',s.flushNanos],['dirtyCells',s.dirtyCells]];el('frameInfo').innerHTML=rows.map(([k,v])=>`<tr><td class='k'>${k}</td><td class='mono'>${v??''}</td></tr>`).join('');}
function drawTree(){const nodes=frame.nodes||[];const byParent=new Map();nodes.forEach(n=>{const p=Number(n.parentId??-1);if(!byParent.has(p))byParent.set(p,[]);byParent.get(p).push(n);});byParent.forEach(arr=>arr.sort((a,b)=>(a.indexInParent||0)-(b.indexInParent||0)));function renderList(pid){const kids=byParent.get(pid)||[];if(!kids.length)return '';return `<ul>${kids.map(n=>{const sel=Number(n.nodeId)===Number(selectedNodeId)?'selected':'';const label=`${n.type||'Node'} #${n.nodeId}${n.id?` (${n.id})`:''}`;return `<li><span class='node ${sel}' data-node='${n.nodeId}'>${label}</span>${renderList(Number(n.nodeId))}</li>`;}).join('')}</ul>`;}const html=renderList(-1)||renderList(0)||'<div class="mono" style="color:#8fa0b8">No tree</div>';const tree=el('tree');tree.innerHTML=html;tree.querySelectorAll('[data-node]').forEach(n=>n.addEventListener('click',()=>{selectedNodeId=Number(n.getAttribute('data-node'));render();}));}
function drawLayout(){const canvas=el('canvas');const W=canvas.clientWidth||900;const H=Math.max(360,window.innerHeight-180);canvas.style.height=`${H}px`;canvas.innerHTML='';const sw=frame.screen?.w||1, sh=frame.screen?.h||1;const scale=Math.min((W-12)/sw,(H-12)/sh);const ox=6,oy=6;(frame.nodes||[]).forEach(n=>{if(!n.layout)return;const x=ox+n.layout.x*scale,y=oy+n.layout.y*scale,w=Math.max(1,n.layout.w*scale),h=Math.max(1,n.layout.h*scale);const d=document.createElement('div');d.className='box'+(Number(n.nodeId)===Number(selectedNodeId)?' selected':'');d.style.left=`${x}px`;d.style.top=`${y}px`;d.style.width=`${w}px`;d.style.height=`${h}px`;d.textContent=`${n.type||'N'}#${n.nodeId}`;d.title=`${n.type||'Node'} #${n.nodeId} (${n.layout.x},${n.layout.y},${n.layout.w},${n.layout.h})`;d.addEventListener('click',()=>{selectedNodeId=Number(n.nodeId);render();});canvas.appendChild(d);});}
function drawNodeInfo(){const n=(frame.nodes||[]).find(x=>Number(x.nodeId)===Number(selectedNodeId));if(!n){el('nodeInfo').innerHTML="<tr><td class='k'>selected</td><td class='mono' style='color:#8fa0b8'>none</td></tr>";return;}const rows=[['nodeId',n.nodeId],['type',n.type],['id',n.id||''],['parentId',n.parentId],['indexInParent',n.indexInParent],['classes',n.classes||''],['flags',(n.flags||[]).join(', ')],['zIndex',n.zIndex],['layout',n.layout?`${n.layout.x},${n.layout.y},${n.layout.w},${n.layout.h}`:''],['layoutNanos',n.cost?.layoutNanos??''],['renderNanos',n.cost?.renderNanos??''],['dirtyCells',n.cost?.dirtyCells??'']];el('nodeInfo').innerHTML=rows.map(([k,v])=>`<tr><td class='k'>${k}</td><td class='mono'>${v??''}</td></tr>`).join('');}
})();
</script></body></html>
